name: PR Stage Diagnostics

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-stage-diagnostics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  stage:
    name: Diagnostic · ${{ matrix.stage }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        stage:
          - release-manifest
          - security-audit
          - lint
          - typecheck
          - unit
          - build
    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run selected stage
        shell: bash
        run: |
          case "${{ matrix.stage }}" in
            release-manifest) node scripts/release-verify.mjs --list ;;
            security-audit) npm run security:audit ;;
            lint) npm run lint ;;
            typecheck) npm run typecheck ;;
            unit) npm run test:unit ;;
            build) npm run build ;;
            *) echo "Unknown stage" >&2; exit 2 ;;
          esac
