name: PR Stage Diagnostics

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pr-stage-diagnostics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  runner-only:
    name: Probe · runner-only
    runs-on: ubuntu-latest
    steps:
      - run: echo "runner available"

  checkout-only:
    name: Probe · checkout
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: test -f package.json

  setup-no-cache:
    name: Probe · setup-node-no-cache
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: node --version && npm --version

  setup-cache:
    name: Probe · setup-node-cache
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: node --version && npm --version

  npm-ci:
    name: Probe · npm-ci
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci --no-audit --no-fund

  npm-ci-ignore-scripts:
    name: Probe · npm-ci-ignore-scripts
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci --ignore-scripts --no-audit --no-fund

  npm-install-ignore-scripts:
    name: Probe · npm-install-ignore-scripts
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm install --ignore-scripts --no-audit --no-fund
