# CI gate (Audit F5/T3): lint + unit + build + launch smoke + publish verification.
# Not: lib/env.ts CI=true iken requireEnv'i atlar (isBuild guard) —
# bu yüzden DATABASE_URI gibi secret'lar olmadan build alınabilir.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Unit · Build · Launch Smoke · Publish Verify
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      PW_USE_SYSTEM_CHROME: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Release gate manifest
        run: node scripts/release-verify.mjs --list

      - name: Runtime dependency audit
        run: npm run security:audit

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (vitest)
        run: npm run test:unit

      - name: Build
        run: npm run build

      - name: Verify system Chrome
        run: google-chrome --version

      - name: Launch smoke gate
        run: npm run launch:smoke

      - name: Publish verification tests
        run: npx playwright test tests/e2e/ tests/security.spec.ts tests/prestige-verification.spec.ts tests/a11y.spec.ts --reporter=line

      - name: Publish target score
        run: npm run publish:target

      - name: Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality
    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Lighthouse CI (autorun)
        run: npx --yes @lhci/cli@0.14.x autorun
